<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Voter PDF Extractor</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f5f5;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:8px;
width:420px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:10px 20px;
background:#0070f3;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0057c2;
}

#status{
margin-top:15px;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h2>Upload Voter PDF</h2>

<input type="file" id="pdfFile" accept="application/pdf">

<br><br>

<button onclick="uploadPDF()">Extract Excel</button>

<p id="status"></p>

</div>

<script>

async function uploadPDF(){

const file = document.getElementById("pdfFile").files[0];

if(!file){
alert("Please select a PDF file");
return;
}

document.getElementById("status").innerText = "Uploading PDF...";

const formData = new FormData();
formData.append("file",file);

try{

const response = await fetch("/api/extract",{
method:"POST",
body:formData
});

if(!response.ok){
throw new Error("Server error");
}

const blob = await response.blob();

const url = window.URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = url;
a.download = "voters.xlsx";
document.body.appendChild(a);
a.click();

document.getElementById("status").innerText = "Excel downloaded successfully";

}catch(err){

document.getElementById("status").innerText = "Error processing file";

}

}

</script>

</body>
</html>
